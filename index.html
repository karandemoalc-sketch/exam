<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Front Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a simple front page created using basic HTML and CSS.</p>
        <p>You can use this as a starting point for your personal blog or portfolio.</p>
    </div>
</body>
</html>
